<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - L@ZY SHOP Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { transition: background-color 0.3s; }
        body.dark-mode { background-color: #1a1a2e; color: #eee; }
        body.dark-mode .main-content { background-color: #16213e; }
        body.dark-mode .user-card, body.dark-mode .navbar-top { background-color: #0f3460; color: #eee; border: 1px solid #1a1a2e; }
        
        .sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 260px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; transition: transform 0.3s; z-index: 1000; }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } .main-content { margin-left: 0 !important; } .menu-toggle { display: block !important; } }
        @media (min-width: 769px) { .menu-toggle { display: none; } .sidebar { transform: translateX(0) !important; } }
        
        .menu-toggle { position: fixed; top: 15px; left: 15px; z-index: 1001; background: #667eea; border: none; color: white; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-nav { padding: 20px 0; }
        .sidebar-nav .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; margin: 5px 15px; border-radius: 10px; transition: all 0.3s; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .sidebar-nav .nav-link:hover, .sidebar-nav .nav-link.active { background: rgba(255,255,255,0.2); transform: translateX(5px); }
        .main-content { margin-left: 260px; padding: 20px; background: #f5f7fb; min-height: 100vh; }
        .user-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; cursor: pointer; transition: all 0.3s; }
        .user-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .navbar-top { background: white; border-radius: 12px; padding: 15px 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .theme-toggle { cursor: pointer; padding: 8px 15px; border-radius: 20px; background: #f0f0f0; transition: all 0.3s; }
        body.dark-mode .theme-toggle { background: #0f3460; color: #ffd700; }
        .status-badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; }
        .status-active { background: #28a745; color: white; }
        .status-blocked { background: #dc3545; color: white; }
        .avatar-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #f0f0f0; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    </style>
</head>
<body>
    <button class="menu-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><i class="bi bi-shop fs-1"></i><h4 class="mt-2">L@ZY SHOP</h4><small>Admin Dashboard</small></div>
        <div class="sidebar-nav">
            <nav class="nav flex-column">
                <a class="nav-link" href="index.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a class="nav-link" href="products.html"><i class="bi bi-box"></i> Products</a>
                <a class="nav-link" href="orders.html"><i class="bi bi-cart"></i> Orders</a>
                <a class="nav-link active" href="users.html"><i class="bi bi-people"></i> Users</a>
                <a class="nav-link" href="analytics.html"><i class="bi bi-graph-up"></i> Analytics</a>
                <a class="nav-link" href="reports.html"><i class="bi bi-file-text"></i> Reports</a>
                <a class="nav-link" href="settings.html"><i class="bi bi-gear"></i> Settings</a>
                <hr><a class="nav-link" href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>
            </nav>
        </div>
    </div>
    
    <div class="main-content">
        <div class="navbar-top">
            <h4 class="mb-0"><i class="bi bi-people"></i> User Management</h4>
            <div class="d-flex gap-3 align-items-center"><input type="text" class="form-control" id="searchInput" placeholder="Search users..." style="width: 250px;"><div class="theme-toggle" onclick="toggleTheme()"><i class="bi bi-moon-stars"></i> <span id="themeText">Dark Mode</span></div></div>
        </div>
        <div class="row" id="usersGrid"></div>
        <nav><ul class="pagination justify-content-center" id="pagination"></ul></nav>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let users = [
            { user_id: 1, first_name: "John", username: "john_doe", phone: "+1234567890", is_blocked: false, total_orders: 5, total_spent: 349.95, avatar_url: "" },
            { user_id: 2, first_name: "Jane", username: "jane_smith", phone: "+1234567891", is_blocked: false, total_orders: 3, total_spent: 199.97, avatar_url: "" },
            { user_id: 3, first_name: "Mike", username: "mike_j", phone: "+1234567892", is_blocked: true, total_orders: 0, total_spent: 0, avatar_url: "" },
            { user_id: 4, first_name: "Sarah", username: "sarah_w", phone: "+1234567893", is_blocked: false, total_orders: 8, total_spent: 567.92, avatar_url: "" }
        ];
        
        let currentPage = 1, currentSearch = '', pageSize = 6;
        
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        document.querySelectorAll('.sidebar-nav .nav-link').forEach(link => {
            link.addEventListener('click', () => { if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open'); });
        });
        
        function setTheme(theme) {
            if (theme === 'dark') { document.body.classList.add('dark-mode'); document.getElementById('themeText').innerHTML = 'Light Mode'; localStorage.setItem('lazy_theme', 'dark'); }
            else { document.body.classList.remove('dark-mode'); document.getElementById('themeText').innerHTML = 'Dark Mode'; localStorage.setItem('lazy_theme', 'light'); }
        }
        function toggleTheme() { setTheme(document.body.classList.contains('dark-mode') ? 'light' : 'dark'); }
        setTheme(localStorage.getItem('lazy_theme') || 'light');
        
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        function getAvatarHtml(user) {
            return `<div class="avatar-img"><i class="bi bi-person fs-4"></i></div>`;
        }
        
        function renderUsers() {
            let filtered = users.filter(u => u.first_name.toLowerCase().includes(currentSearch.toLowerCase()) || u.username.toLowerCase().includes(currentSearch.toLowerCase()));
            const totalPages = Math.ceil(filtered.length / pageSize);
            const start = (currentPage - 1) * pageSize;
            const paginated = filtered.slice(start, start + pageSize);
            
            const grid = document.getElementById('usersGrid');
            grid.innerHTML = '';
            paginated.forEach(user => {
                const statusClass = user.is_blocked ? 'status-blocked' : 'status-active';
                const statusText = user.is_blocked ? 'Blocked' : 'Active';
                grid.innerHTML += `<div class="col-md-6 col-lg-4"><div class="user-card" onclick="viewUser(${user.user_id})"><div class="d-flex"><div class="me-3">${getAvatarHtml(user)}</div><div class="flex-grow-1"><div class="d-flex justify-content-between"><h6 class="mb-1">${escapeHtml(user.first_name)}</h6><span class="status-badge ${statusClass}">${statusText}</span></div><small class="text-muted">@${escapeHtml(user.username)}</small><div class="mt-2 small"><div><i class="bi bi-telephone"></i> ${user.phone}</div><div><i class="bi bi-cart"></i> Orders: ${user.total_orders}</div><div><i class="bi bi-currency-dollar"></i> Spent: $${user.total_spent.toFixed(2)}</div></div></div></div></div></div>`;
            });
            
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            if (totalPages > 1) {
                if (currentPage > 1) pagination.innerHTML += `<li class="page-item"><a class="page-link" onclick="goToPage(${currentPage - 1})">Previous</a></li>`;
                for (let i = 1; i <= Math.min(totalPages, 5); i++) pagination.innerHTML += `<li class="page-item ${i === currentPage ? 'active' : ''}"><a class="page-link" onclick="goToPage(${i})">${i}</a></li>`;
                if (currentPage < totalPages) pagination.innerHTML += `<li class="page-item"><a class="page-link" onclick="goToPage(${currentPage + 1})">Next</a></li>`;
            }
        }
        
        function viewUser(userId) { alert(`View details for user ID: ${userId}\n\nIn a full app, this would show user details page.`); }
        function goToPage(page) { currentPage = page; renderUsers(); }
        
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', function(e) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => { currentSearch = e.target.value; currentPage = 1; renderUsers(); }, 300);
        });
        
        renderUsers();
    </script>
</body>
</html>
